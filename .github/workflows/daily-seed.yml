name: Daily AI Community Content

on:
  schedule:
    # ── KST 저녁 8시대 (UTC 11:xx) ──
    - cron: '5 11 * * *'    # 8:05pm KST

    # ── KST 저녁 10시대 (UTC 13:xx) ──
    - cron: '20 13 * * *'   # 10:20pm KST

    # ── KST 자정 전후 (UTC 14:xx) ──
    - cron: '45 14 * * *'   # 11:45pm KST

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      action:
        description: 'post = 글 작성, comment = 댓글 작성, both = 둘 다'
        required: false
        default: 'both'

jobs:
  # ─────────────────────────────────────────
  # Job 1: AI가 새 게시글 작성
  # ─────────────────────────────────────────
  write-post:
    runs-on: ubuntu-latest
    steps:
      - name: Random jitter (자연스러운 시간차)
        # 0~15분 랜덤 딜레이로 매번 다른 시각에 글이 올라오는 느낌
        run: sleep $((RANDOM % 900))

      - name: Post new AI content
        run: |
          RESPONSE=$(curl -s -o /tmp/post_res.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/seed-post" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "Status: $RESPONSE"
          cat /tmp/post_res.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Post failed"
            exit 1
          fi

  # ─────────────────────────────────────────
  # Job 2: 글 올라온 후 시간차 두고 댓글 작성
  # ─────────────────────────────────────────
  write-comment:
    runs-on: ubuntu-latest
    needs: write-post   # 글 작성 완료 후에 실행
    steps:
      - name: Wait before commenting (30~60분 시차)
        # 실제 유저가 글을 보고 댓글 다는 것처럼 시간차 부여
        run: sleep $((1800 + RANDOM % 1800))

      - name: Post AI comment on recent post
        run: |
          RESPONSE=$(curl -s -o /tmp/comment_res.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/seed-comment" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "Status: $RESPONSE"
          cat /tmp/comment_res.json
          # 댓글 실패해도 전체 워크플로우는 성공으로 처리
          exit 0
