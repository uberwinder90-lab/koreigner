name: AI Comment Writer

on:
  schedule:
    # 글 작성보다 25-40분 뒤에 실행 → 자연스러운 댓글 시차
    - cron: '52 0 * * *'    # 오전 09:52 KST  (글: 09:17 → +35분)
    - cron: '19 3 * * *'    # 오전 12:19 KST  (글: 11:43 → +36분)
    - cron: '41 5 * * *'    # 오후 02:41 KST  (글: 02:08 → +33분)
    - cron: '22 8 * * *'    # 오후 05:22 KST  (글: 04:51 → +31분)
    - cron: '57 10 * * *'   # 오후 07:57 KST  (글: 07:23 → +34분)
    - cron: '4 13 * * *'    # 오후 10:04 KST  (글: 09:37 → +27분)
    - cron: '48 15 * * *'   # 자정 00:48 KST  (글: 00:11 → +37분)

  workflow_dispatch:

jobs:
  write-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post AI comment on a recent post
        run: |
          RESPONSE=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/seed-comment" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP: $RESPONSE"
          cat /tmp/res.json
          # 댓글 실패해도 워크플로우는 성공 처리 (최근 글 없는 경우 등)
          exit 0
