name: AI Post Writer

on:
  schedule:
    # 오전 9시 ~ 새벽 1시 KST (UTC+9), 약 2-3시간 간격 (총 7회/일)
    # KST → UTC 변환표:
    - cron: '0 0 * * *'    # 오전 09:00 KST
    - cron: '30 2 * * *'   # 오전 11:30 KST
    - cron: '0 5 * * *'    # 오후 02:00 KST
    - cron: '30 7 * * *'   # 오후 04:30 KST
    - cron: '0 10 * * *'   # 오후 07:00 KST
    - cron: '30 12 * * *'  # 오후 09:30 KST
    - cron: '0 15 * * *'   # 자정 00:00 KST

  workflow_dispatch:  # 수동 테스트용

jobs:
  write-post:
    runs-on: ubuntu-latest
    steps:
      - name: Post new AI-generated community content
        run: |
          RESPONSE=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/seed-post" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP: $RESPONSE"
          cat /tmp/res.json
          [ "$RESPONSE" = "200" ] || exit 1
