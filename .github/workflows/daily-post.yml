name: AI Post Writer

on:
  schedule:
    # 오전 9시 ~ 새벽 1시 KST, 약 2-3시간 간격 (총 7회/일)
    # 분을 불규칙하게 배치 → 정각/반시 아닌 자연스러운 시간
    - cron: '17 0 * * *'    # 오전 09:17 KST
    - cron: '43 2 * * *'    # 오전 11:43 KST
    - cron: '8 5 * * *'     # 오후 02:08 KST
    - cron: '51 7 * * *'    # 오후 04:51 KST
    - cron: '23 10 * * *'   # 오후 07:23 KST
    - cron: '37 12 * * *'   # 오후 09:37 KST
    - cron: '11 15 * * *'   # 자정 00:11 KST

  workflow_dispatch:  # 수동 테스트용

jobs:
  write-post:
    runs-on: ubuntu-latest
    steps:
      - name: Post new AI-generated community content
        run: |
          RESPONSE=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/seed-post" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP: $RESPONSE"
          cat /tmp/res.json
          [ "$RESPONSE" = "200" ] || exit 1
